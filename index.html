const EDIT_MODE = new URLSearchParams(location.search).get("edit") === "1";
const LOCAL_EDIT_KEY = "wc26_family_pending_edits_v1";
let state = {predictions:{}, scores:{}};
let undoStack = [];
function parseJSON(v,fallback){try{return v?JSON.parse(v):fallback}catch(e){return fallback}}
function setStatus(msg){document.getElementById("status").textContent=msg}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function savePending(){if(EDIT_MODE)localStorage.setItem(LOCAL_EDIT_KEY,JSON.stringify(state))}
function pushUndo(label){undoStack.push({label,state:JSON.parse(JSON.stringify(state))});if(undoStack.length>75)undoStack.shift()}
function outcomeFromScore(score){if(!score)return"";const m=String(score).trim().replace(/[–—]/g,"-").match(/^(\d+)\s*-\s*(\d+)$/);if(!m)return"";const a=Number(m[1]),b=Number(m[2]);return a>b?"W":a<b?"L":"D"}
function pointsFor(key){let pts=0;FIXTURES.forEach(f=>{const outcome=outcomeFromScore(state.scores[f.id]);const pick=state.predictions[f.id]?.[key];if(outcome&&pick===outcome)pts+=3});return pts}
async function loadData(){try{const res=await fetch("./data.json?cache="+Date.now());if(!res.ok)throw new Error("HTTP "+res.status);const data=await res.json();state={predictions:data.predictions||{},scores:data.scores||{}};if(EDIT_MODE){const pending=parseJSON(localStorage.getItem(LOCAL_EDIT_KEY),null);if(pending&&confirm("Use your unsaved local edit draft instead of the committed GitHub data?"))state=pending;}setStatus(EDIT_MODE?"Edit Mode":"View Mode");}catch(err){state={predictions:{},scores:{}};setStatus("Could not load data.json: "+err.message);}}
function renderLeaderboard(){const rows=MEMBERS.map(m=>({...m,points:pointsFor(m.key)})).sort((a,b)=>b.points-a.points);const medals=["🥇","🥈","🥉","🥄"];document.getElementById("leaderboard").innerHTML=rows.map((m,i)=>`<article class="card" style="background:${m.color}"><div class="emoji">${m.emoji}</div><h2>${medals[i]} ${escapeHtml(m.name)}</h2><p>${escapeHtml(m.role)}</p><div class="points">${m.points}</div><div style="font-weight:850;opacity:.9">points</div></article>`).join("")}
function renderFilters(){const stages=[...new Set(FIXTURES.map(f=>f.stage))];const sel=document.getElementById("stageFilter");const current=sel.value||"all";sel.innerHTML='<option value="all">All stages</option>'+stages.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");sel.value=stages.includes(current)?current:"all"}
function hay(f){return `${f.matchNo} ${f.stage} ${f.group} ${f.date} ${f.team1} ${f.team2}`.toLowerCase()}
function renderMatches(){document.body.classList.toggle("readonly",!EDIT_MODE);const stage=document.getElementById("stageFilter").value;const q=document.getElementById("searchBox").value.toLowerCase().trim();const shown=FIXTURES.filter(f=>(stage==="all"||f.stage===stage)&&(!q||hay(f).includes(q)));document.getElementById("countText").textContent=`${shown.length} / ${FIXTURES.length} matches shown`;document.getElementById("matches").innerHTML=shown.map(f=>{const score=state.scores[f.id]||"";const outcome=outcomeFromScore(score);return `<article class="match" data-id="${f.id}"><div class="match-head"><span class="badge">Match ${f.matchNo}</span><span class="badge">📅 ${escapeHtml(f.date)}</span><span class="badge">${escapeHtml(f.stage)}</span></div><div class="title">⚽ ${escapeHtml(f.team1)} vs ${escapeHtml(f.team2)}</div><div class="score-row"><label for="score-${f.id}">Actual score</label><input class="score" id="score-${f.id}" value="${escapeHtml(score)}" inputmode="numeric" placeholder="" ${EDIT_MODE?"":"disabled"}><div class="outcome">${outcome?"Result: "+outcome:""}</div></div>${MEMBERS.map(m=>{const pick=state.predictions[f.id]?.[m.key]||"";const rowClass=(outcome&&pick===outcome)?"pred-row correct-prediction-row":"pred-row";return `<div class="${rowClass}"><div class="member-name" style="color:${m.color}">${m.emoji} ${escapeHtml(m.name)}</div><div class="wdl">${["W","D","L"].map(v=>{const correctClass=(outcome&&pick===v&&outcome===v)?"correct-pick":"";return `<input type="radio" id="${m.key}-${f.id}-${v}" name="${m.key}-${f.id}" value="${v}" ${pick===v?"checked":""} ${EDIT_MODE?"":"disabled"}><label class="${correctClass}" for="${m.key}-${f.id}-${v}">${v}</label>`}).join("")}</div></div>`}).join("")}</article>`}).join("");if(EDIT_MODE){shown.forEach(f=>{const scoreEl=document.getElementById(`score-${f.id}`);scoreEl.addEventListener("focus",()=>scoreEl.dataset.previousValue=state.scores[f.id]||"");scoreEl.addEventListener("change",e=>{const oldValue=scoreEl.dataset.previousValue||"";const newValue=e.target.value.trim();if(oldValue!==newValue)pushUndo("Score change for match "+f.matchNo);state.scores[f.id]=newValue;savePending();setStatus("Score for match "+f.matchNo+" saved locally. Export data.json to publish.");renderLeaderboard();renderMatches()});MEMBERS.forEach(m=>["W","D","L"].forEach(v=>{const el=document.getElementById(`${m.key}-${f.id}-${v}`);if(el)el.addEventListener("change",()=>{const oldValue=state.predictions[f.id]?.[m.key]||"";if(oldValue!==v)pushUndo("Prediction change for match "+f.matchNo);if(!state.predictions[f.id])state.predictions[f.id]={};state.predictions[f.id][m.key]=v;savePending();setStatus("Prediction for match "+f.matchNo+" saved locally. Export data.json to publish.");renderLeaderboard()})}))})}}
function undoLast(){if(!EDIT_MODE)return;if(!undoStack.length){setStatus("Nothing to undo.");return}const last=undoStack.pop();state=last.state||{predictions:{},scores:{}};savePending();renderLeaderboard();renderMatches();setStatus("Undid: "+(last.label||"last change"))}
function exportDataJson(){const payload={lastUpdated:new Date().toLocaleDateString("en-GB").replace(/\//g,"-"),scores:state.scores||{},predictions:state.predictions||{}};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="data.json";a.click();URL.revokeObjectURL(a.href);setStatus("Downloaded data.json. Upload/replace it in GitHub to publish.");}
function archiveSnapshot(){const leaderboard=MEMBERS.map(m=>({name:m.name,role:m.role,points:pointsFor(m.key)})).sort((a,b)=>b.points-a.points);const payload={exportedAt:new Date().toISOString(),leaderboard,state};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="family-world-cup-2026-snapshot.json";a.click();URL.revokeObjectURL(a.href);setStatus("Snapshot archived.")}
document.getElementById("importFile").addEventListener("change",async e=>{const file=e.target.files[0];if(!file)return;const payload=parseJSON(await file.text(),null);if(!payload){setStatus("Import failed.");return}pushUndo("Import data.json");state={scores:payload.scores||{},predictions:payload.predictions||{}};savePending();renderLeaderboard();renderMatches();setStatus("Imported data.json locally. Export to publish after edits.")});
document.getElementById("stageFilter").addEventListener("change",renderMatches);document.getElementById("searchBox").addEventListener("input",renderMatches);
function setupMode(){document.querySelectorAll(".edit-only").forEach(el=>el.style.display=EDIT_MODE?"inline-flex":"none");document.getElementById("modeNotice").innerHTML=EDIT_MODE?"<strong>Edit mode.</strong> Make changes visually. Then click <strong>Export data.json</strong> and replace the file in GitHub.":"<strong>Players can edit predictions anytime BEFORE the Kick Off of any game</strong>"}
(async function start(){try{setupMode();renderFilters();await loadData();renderLeaderboard();renderMatches();}catch(err){setStatus("Display error: "+err.message);document.getElementById("matches").innerHTML='<article class="match"><div class="title">Display error</div><p>'+escapeHtml(err.message)+'</p></article>'}})();
</script>
